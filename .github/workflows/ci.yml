name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  server-tests:
    name: Server (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r server/requirements-dev.txt

      - name: Run pytest
        run: |
          cd server
          python -m pytest

  plugin-build:
    name: Plugin (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin dependencies
        run: |
          cd plugin
          npm install --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        run: |
          cd plugin
          npx tsc --noEmit

      - name: Build (esbuild)
        run: |
          cd plugin
          node esbuild.config.mjs production
